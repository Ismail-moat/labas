<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Orders - Labas.</title>
    <link rel="stylesheet" href="../css/admin.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">labas. admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.jsp">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="orders.html" class="active">Orders</a>
        <a href="settings.html">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" style="color: #666; text-decoration: none;">&larr; Back to Store</a>
      </div>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-title">Orders Management</div>
        <div class="header-user">Admin User</div>
      </header>
      <div class="content-scroll">
        <div class="table-container">
          <div class="table-header">
            <h3>Order History</h3>
          </div>
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>#1024</td>
                <td>John Doe</td>
                <td>Oct 24, 2025</td>
                <td>890 dh</td>
                <td><span class="status shipped">Shipped</span></td>
                <td class="actions">
                  <button>View</button>
                  <button class="delete" onclick="deleteItem('order')">Delete</button>
                </td>
              </tr>
              <tr>
                <td>#1025</td>
                <td>Karlina Bias</td>
                <td>Oct 25, 2025</td>
                <td>450 dh</td>
                <td><span class="status pending">Processing</span></td>
                <td class="actions">
                  <button>View</button>
                  <button class="delete" onclick="deleteItem('order')">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="../js/admin.js"></script>
  </body>
</html>
