<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products - Labas.</title>
    <link rel="stylesheet" href="../css/admin.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">labas. admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.jsp">Dashboard</a>
        <a href="products.html" class="active">Products</a>
        <a href="orders.html">Orders</a>
        <a href="settings.html">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" style="color: #666; text-decoration: none;">&larr; Back to Store</a>
      </div>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-title">Products Management</div>
        <div class="header-user">Admin User</div>
      </header>
      <div class="content-scroll">
        <div class="table-container">
          <div class="table-header">
            <h3>All Products</h3>
            <button class="btn-primary" onclick="alert('Add product feature coming soon!')">+ Add New</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>Oversized T-Shirt</strong></td>
                <td>Men</td>
                <td>222 dh</td>
                <td>45</td>
                <td class="actions">
                  <button>Edit</button>
                  <button class="delete" onclick="deleteItem('product')">Delete</button>
                </td>
              </tr>
              <tr>
                <td><strong>Leather Overcoat</strong></td>
                <td>Women</td>
                <td>890 dh</td>
                <td>12</td>
                <td class="actions">
                  <button>Edit</button>
                  <button class="delete" onclick="deleteItem('product')">Delete</button>
                </td>
              </tr>
              <tr>
                <td><strong>The Hundred Hoody</strong></td>
                <td>Men</td>
                <td>450 dh</td>
                <td>30</td>
                <td class="actions">
                  <button>Edit</button>
                  <button class="delete" onclick="deleteItem('product')">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="../js/admin.js"></script>
  </body>
</html>
